<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow - AI-Powered Study Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #ec4899;
            --accent: #f59e0b;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #334155;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.5);
            --shadow-xl: 0 20px 25px rgba(0, 0, 0, 0.6);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Sidebar Navigation */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100vh;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 24px 0;
            z-index: 100;
            overflow-y: auto;
        }

        .logo {
            padding: 0 24px;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 800;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin: 4px 12px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s;
            cursor: pointer;
            font-weight: 500;
        }

        .nav-link:hover {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary-light);
        }

        .nav-link.active {
            background: var(--primary);
            color: white;
        }

        .nav-icon {
            font-size: 20px;
            width: 24px;
            text-align: center;
        }

        .user-profile {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            margin-top: auto;
        }

        .user-stats {
            display: flex;
            gap: 16px;
            margin-top: 12px;
        }

        .user-stat {
            text-align: center;
        }

        .user-stat-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-light);
        }

        .user-stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            padding: 32px;
            min-height: 100vh;
        }

        .page {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Dashboard */
        .page-header {
            margin-bottom: 32px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-secondary);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-1);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .stat-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-icon {
            font-size: 28px;
            opacity: 0.6;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-change {
            font-size: 13px;
            color: var(--success);
        }

        /* Cards */
        .card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
        }

        /* Buttons */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--error);
            color: white;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
        }

        /* Timer */
        .timer-container {
            background: var(--gradient-1);
            border-radius: 24px;
            padding: 64px 32px;
            text-align: center;
            margin-bottom: 32px;
            position: relative;
            overflow: hidden;
        }

        .timer-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
        }

        .timer-mode-tabs {
            display: inline-flex;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 32px;
        }

        .timer-mode-tab {
            padding: 10px 24px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .timer-mode-tab.active {
            background: white;
            color: var(--primary);
        }

        .timer-display {
            font-size: 96px;
            font-weight: 800;
            color: white;
            margin: 32px 0;
            letter-spacing: -2px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .timer-controls {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .timer-btn {
            padding: 16px 40px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .timer-btn-start {
            background: white;
            color: var(--primary);
        }

        .timer-btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 24px rgba(255, 255, 255, 0.3);
        }

        .timer-btn-pause,
        .timer-btn-reset {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .timer-btn-pause:hover,
        .timer-btn-reset:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .timer-info {
            display: flex;
            justify-content: center;
            gap: 48px;
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.9);
        }

        .timer-info-item {
            text-align: center;
        }

        .timer-info-value {
            font-size: 24px;
            font-weight: 700;
        }

        .timer-info-label {
            font-size: 12px;
            opacity: 0.8;
            text-transform: uppercase;
        }

        /* Focus Mode overlay style */
        .focus-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            z-index: 999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .focus-mode.active {
            display: flex;
        }

        .focus-exit {
            position: absolute;
            top: 32px;
            right: 32px;
        }

        .focus-timer {
            font-size: 120px;
            font-weight: 800;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 40px 0;
        }

        /* Notifications styling */
        .notification {
            position: fixed;
            top: 24px;
            right: 24px;
            background: var(--bg-secondary);
            padding: 20px 24px;
            border-radius: 12px;
            border-left: 4px solid var(--success);
            box-shadow: var(--shadow-xl);
            z-index: 1001;
            animation: slideIn 0.3s ease;
            max-width: 400px;
        }

        @keyframes slideIn {
            from { transform: translateX(500px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .notification-title { font-weight: 700; margin-bottom: 4px; }
        .notification-message { font-size: 14px; color: var(--text-secondary); }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <h1>⚡ StudyFlow</h1>
        </div>
        <ul class="nav-menu">
            <li class="nav-item"><a class="nav-link active" data-page="dashboard"><span class="nav-icon">📊</span><span>Dashboard</span></a></li>
            <li class="nav-item"><a class="nav-link" data-page="timer"><span class="nav-icon">⏱️</span><span>Study Timer</span></a></li>
        </ul>
        <div class="user-profile">
            <div class="user-stats">
                <div class="user-stat"><div class="user-stat-value" id="sidebarLevel">1</div><div class="user-stat-label">Level</div></div>
                <div class="user-stat"><div class="user-stat-value" id="sidebarStreak">0🔥</div><div class="user-stat-label">Streak</div></div>
                <div class="user-stat"><div class="user-stat-value" id="sidebarXP">0</div><div class="user-stat-label">XP</div></div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="page active" id="dashboard">
            <div class="page-header">
                <h1 class="page-title">Welcome back! 👋</h1>
                <p class="page-subtitle">Here's your isolated workstation overview for today</p>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-header"><span class="stat-label">Today's Study Time</span><span class="stat-icon">⏱️</span></div>
                    <div class="stat-value" id="todayStudyTime">0h 0m</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header"><span class="stat-label">Current Streak</span><span class="stat-icon">🔥</span></div>
                    <div class="stat-value" id="currentStreak">0</div>
                </div>
            </div>
        </div>

        <div class="page" id="timer">
            <div class="page-header">
                <h1 class="page-title">Study Workstation Timer</h1>
                <p class="page-subtitle">Automatic 5-min breaks configured below</p>
            </div>
            <div class="timer-container">
                <div class="timer-mode-tabs">
                    <button class="timer-mode-tab active" data-mode="pomodoro">Pomodoro</button>
                    <button class="timer-mode-tab" data-mode="stopwatch">Stopwatch</button>
                    <button class="timer-mode-tab" data-mode="custom">Custom (45m)</button>
                </div>
                <div class="timer-display" id="timerDisplay">25:00</div>
                <div class="timer-controls">
                    <button class="timer-btn timer-btn-start" id="startTimer">Start</button>
                    <button class="timer-btn timer-btn-pause" id="pauseTimer">Pause</button>
                    <button class="timer-btn timer-btn-reset" id="resetTimer">Reset</button>
                </div>
                <div class="timer-info">
                    <div class="timer-info-item"><div class="timer-info-value" id="sessionCount">1</div><div class="timer-info-label">Session</div></div>
                    <div class="timer-info-item"><div class="timer-info-value" id="breakCount">0</div><div class="timer-info-label">Breaks</div></div>
                    <div class="timer-info-item"><div class="timer-info-value" id="todayTime">0m</div><div class="timer-info-label">Today</div></div>
                </div>
            </div>
            <div class="card">
                <div class="form-group">
                    <label class="form-label">Current Subject Context</label>
                    <input type="text" class="form-input" id="currentSubject" placeholder="e.g., Mathematics, Computer Science">
                </div>
                <div class="form-group">
                    <label class="form-label">What target goal are you studying?</label>
                    <input type="text" class="form-input" id="currentTask" placeholder="e.g., Python Architecture Layouts">
                </div>
                <button class="btn btn-primary" id="enterFocusMode">🎯 Enter Immersive Focus Mode</button>
            </div>
        </div>
    </main>

    <div class="focus-mode" id="focusModeView">
        <button class="btn btn-secondary focus-exit" id="exitFocusMode">✕ Exit</button>
        <div class="focus-timer" id="focusTimer">25:00</div>
        <div class="timer-controls">
            <button class="btn btn-primary" id="focusStart">Start</button>
        </div>
    </div>

    <script>
        // --- MULTI-DEVICE DATA ISOLATION NAMESPACE CONTEXT ENGINE ---
        if (!localStorage.getItem('studyflow_device_fingerprint')) {
            const secureRandomString = 'device_' + Math.random().toString(36).substring(2, 15) + Date.now().toString(36);
            localStorage.setItem('studyflow_device_fingerprint', secureRandomString);
        }
        const COMP_UNIQUE_PREFIX = localStorage.getItem('studyflow_device_fingerprint') + '::';

        const SecureStorage = {
            get(key, defaultValue = null) {
                try {
                    const value = localStorage.getItem(COMP_UNIQUE_PREFIX + key);
                    return value ? JSON.parse(value) : defaultValue;
                } catch (e) { return defaultValue; }
            },
            set(key, value) {
                try {
                    localStorage.setItem(COMP_UNIQUE_PREFIX + key, JSON.stringify(value));
                } catch (e) { console.error("Write Blocked:", e); }
            }
        };

        // Initialize Isolated Domain State Structures
        const AppData = {
            user: SecureStorage.get('user', { level: 1, xp: 0, streak: 0, lastStudyDate: null, totalStudyMinutes: 0 }),
            studySessions: SecureStorage.get('studySessions', []),
            settings: SecureStorage.get('settings', { pomodoroTime: 25, shortBreak: 5, longBreak: 15, autoBreak: true })
        };

        function saveData() {
            SecureStorage.set('user', AppData.user);
            SecureStorage.set('studySessions', AppData.studySessions);
            SecureStorage.set('settings', AppData.settings);
        }

        // --- TIMER PIPELINE INFRASTRUCTURE (ADVANCED AUTO LOOP AUTOMATION) ---
        let timerInterval = null;
        let timerRunning = false;
        let timerMode = 'pomodoro'; // Supports 'pomodoro', 'stopwatch', 'custom'
        let currentTimerState = 'study'; // State switches: 'study' vs 'break'
        let timerSeconds = AppData.settings.pomodoroTime * 60;
        let runningAccumulatorSeconds = 0; 
        let currentSessionStartTimestamp = null;
        let sessionCount = 1;
        let breakCount = 0;

        // Navigation Controller Actions
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', (e) => {
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                const targetedLink = e.currentTarget;
                targetedLink.classList.add('active');
                
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(targetedLink.dataset.page).classList.add('active');
            });
        });

        // Tab Controller Selector
        document.querySelectorAll('.timer-mode-tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                document.querySelectorAll('.timer-mode-tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                timerMode = e.target.dataset.mode;
                currentTimerState = 'study'; 
                resetTimer();
            });
        });

        function updateTimerDisplay() {
            const calculatedMinutes = Math.floor(Math.abs(timerSeconds) / 60);
            const calculatedSeconds = Math.abs(timerSeconds) % 60;
            const absoluteStringValue = `${calculatedMinutes.toString().padStart(2, '0')}:${calculatedSeconds.toString().padStart(2, '0')}`;
            
            document.getElementById('timerDisplay').textContent = absoluteStringValue;
            document.getElementById('focusTimer').textContent = absoluteStringValue;
        }

        function startTimer() {
            if (timerRunning) return;
            timerRunning = true;
            currentSessionStartTimestamp = Date.now();

            timerInterval = setInterval(() => {
                if (timerMode === 'stopwatch') {
                    timerSeconds++;
                    runningAccumulatorSeconds++;
                } else {
                    timerSeconds--;
                    if (currentTimerState === 'study') {
                        runningAccumulatorSeconds++;
                    }
                    
                    if (timerSeconds <= 0) {
                        processLoopTransition();
                        return;
                    }
                }
                updateTimerDisplay();
                updateRealtimeMinutesTracker();
            }, 1000);

            document.getElementById('startTimer').textContent = 'Running';
            document.getElementById('focusStart').textContent = 'Running';
        }

        function pauseTimer() {
            if (!timerRunning) return;
            clearInterval(timerInterval);
            timerRunning = false;

            document.getElementById('startTimer').textContent = 'Start';
            document.getElementById('focusStart').textContent = 'Start';
            saveData();
        }

        function resetTimer() {
            pauseTimer();
            runningAccumulatorSeconds = 0;
            if (currentTimerState === 'study') {
                if (timerMode === 'pomodoro') {
                    timerSeconds = AppData.settings.pomodoroTime * 60;
                } else if (timerMode === 'stopwatch') {
                    timerSeconds = 0;
                } else if (timerMode === 'custom') {
                    timerSeconds = 45 * 60;
                }
            } else {
                timerSeconds = 5 * 60; // 5-minute fixed automatic break setup
            }
            updateTimerDisplay();
        }

        function processLoopTransition() {
            clearInterval(timerInterval);
            timerRunning = false;

            if (currentTimerState === 'study') {
                // Active study period finished
                const minutesToCommit = Math.max(1, Math.floor(runningAccumulatorSeconds / 60));
                addStudySession(minutesToCommit);
                
                sessionCount++;
                document.getElementById('sessionCount').textContent = sessionCount;
                addXP(25);
                
                showNotification('Session Finished! 🎉', 'Your 5-minute break begins right now.');
                
                // Shift context into automatic 5-minute break condition loop
                currentTimerState = 'break';
                timerSeconds = 5 * 60; // Set to exactly 5 minutes break
                runningAccumulatorSeconds = 0;
                updateTimerDisplay();
                
                // Auto-trigger break session activation
                startTimer();
            } else {
                // Break period finished, return back into execution study pattern loop
                breakCount++;
                document.getElementById('breakCount').textContent = breakCount;
                
                showNotification('Break Over! ⚡', 'Break finished. Your next focus study session has automatically launched.');
                
                currentTimerState = 'study';
                runningAccumulatorSeconds = 0;
                if (timerMode === 'pomodoro') {
                    timerSeconds = AppData.settings.pomodoroTime * 60;
                } else if (timerMode === 'custom') {
                    timerSeconds = 45 * 60;
                } else {
                    timerSeconds = 25 * 60;
                }
                
                updateTimerDisplay();
                // Restart study session loop automatically
                startTimer();
            }
        }

        function addStudySession(minutes) {
            const currentDateString = new Date().toDateString();
            AppData.studySessions.push({
                date: currentDateString,
                duration: minutes,
                subject: document.getElementById('currentSubject').value || 'General Study',
                task: document.getElementById('currentTask').value || 'Core Focus Objective',
                timestamp: Date.now()
            });

            AppData.user.totalStudyMinutes += minutes;

            // Day calculation context setup
            if (AppData.user.lastStudyDate !== currentDateString) {
                const pastDateObj = new Date(AppData.user.lastStudyDate);
                const activeDateObj = new Date(currentDateString);
                const computedDifference = Math.floor((activeDateObj - pastDateObj) / (1000 * 60 * 60 * 24));
                
                if (computedDifference === 1) {
                    AppData.user.streak++;
                } else if (computedDifference > 1 || !AppData.user.lastStudyDate) {
                    AppData.user.streak = 1;
                }
                AppData.user.lastStudyDate = currentDateString;
            }
            saveData();
            updateDashboard();
        }

        function updateRealtimeMinutesTracker() {
            const todayStr = new Date().toDateString();
            const matchingSessions = AppData.studySessions.filter(s => s.date === todayStr);
            const aggregateMinutes = matchingSessions.reduce((total, s) => total + s.duration, 0) + Math.floor(runningAccumulatorSeconds / 60);
            document.getElementById('todayTime').textContent = `${aggregateMinutes}m`;
        }

        function addXP(amount) {
            AppData.user.xp += amount;
            const computedTargetLevel = Math.floor(Math.sqrt(AppData.user.xp / 100)) + 1;
            if (computedTargetLevel > AppData.user.level) {
                AppData.user.level = computedTargetLevel;
                showNotification('Level Up! 🌟', `You reached Level ${computedTargetLevel}`);
            }
            saveData();
            updateDashboard();
        }

        function updateDashboard() {
            const todayStr = new Date().toDateString();
            const matchingSessions = AppData.studySessions.filter(s => s.date === todayStr);
            const totalMins = matchingSessions.reduce((total, s) => total + s.duration, 0);
            
            const renderHours = Math.floor(totalMins / 60);
            const renderMins = totalMins % 60;
            
            document.getElementById('todayStudyTime').textContent = `${renderHours}h ${renderMins}m`;
            document.getElementById('currentStreak').textContent = AppData.user.streak;
            
            // Sync with profile elements
            document.getElementById('sidebarLevel').textContent = AppData.user.level;
            document.getElementById('sidebarStreak').textContent = `${AppData.user.streak}🔥`;
            document.getElementById('sidebarXP').textContent = AppData.user.xp;
        }

        function showNotification(title, message) {
            const toast = document.createElement('div');
            toast.className = 'notification';
            toast.innerHTML = `
                <div class="notification-title">${title}</div>
                <div class="notification-message">${message}</div>
            `;
            document.body.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 4000);
        }

        // --- INTERACTION HOOK HANDLERS ---
        document.getElementById('startTimer').addEventListener('click', () => {
            if (timerRunning) pauseTimer(); else startTimer();
        });
        document.getElementById('pauseTimer').addEventListener('click', pauseTimer);
        document.getElementById('resetTimer').addEventListener('click', resetTimer);

        // Immersive Overlays Control
        document.getElementById('enterFocusMode').addEventListener('click', () => {
            document.getElementById('focusModeView').classList.add('active');
        });
        document.getElementById('exitFocusMode').addEventListener('click', () => {
            document.getElementById('focusModeView').classList.remove('active');
        });
        document.getElementById('focusStart').addEventListener('click', () => {
            if (timerRunning) pauseTimer(); else startTimer();
        });

        // Initialize View Data on Page Load Execution
        updateTimerDisplay();
        updateDashboard();
    </script>
</body>
</html>
